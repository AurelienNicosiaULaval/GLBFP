on:
  push:
    branches: [main, master, dev-publication]
  pull_request:
  workflow_dispatch:

name: test-coverage

permissions:
  contents: read

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Test coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          coverage <- covr::package_coverage()
          print(coverage)
          if (nzchar(Sys.getenv("CODECOV_TOKEN"))) {
            covr::codecov(coverage = coverage, token = Sys.getenv("CODECOV_TOKEN"))
          } else {
            message("CODECOV_TOKEN is not set; skipping Codecov upload.")
          }
        shell: Rscript {0}
